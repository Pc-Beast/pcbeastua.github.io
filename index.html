        .header-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        header h1 span {
            color: var(--accent-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.75rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
        }

        .tg-btn:hover {
            background-color: #0077b3;
            transform: translateY(-2px);
        }

        .tg-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            fill: currentColor;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-filter-bar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background-color: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            font-weight: 600;
        }

        .section-title {
            font-size: 1.75rem;
            margin: 2rem 0 1rem 0;
            border-left: 4px solid var(--accent-color);
            padding-left: 0.75rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #475569;
        }

        .badge-container {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-status { background-color: #334155; color: #f1f5f9; }
        .badge-warranty { background-color: #0369a1; color: #e0f2fe; }
        .badge-package { background-color: #14532d; color: #dcfce7; }
        .badge-danger { background-color: var(--danger-color); color: white; }

        .product-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .product-price span {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .buy-btn {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-primary);
        }
    </style>
</head>
